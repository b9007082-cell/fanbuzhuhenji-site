    <header class="site-header">
      <a class="brand" href="index.html" aria-label="飯不著痕跡首頁">
        <img src="assets/logo.png" alt="飯不著痕跡">
      </a>
      <button class="menu-toggle" type="button" aria-label="開啟選單" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav class="nav" aria-label="主要導覽">
        <a href="index.html">主頁</a>

        <a href="about.html">關於我們</a>

      </nav>
    </header>

    <main>
      <section class="hero page-hero menu-hero">
        <div class="hero-content compact">
          <p class="eyebrow">MENU</p>
          <h1>美味菜單</h1>
          <p class="hero-copy">日式沖繩飯糰、飲品、點心，現點現做，料足不偷工。</p>
        </div>
      </section>

      <section class="section menu-page">
        <div class="wrap">
          <img class="section-title" src="assets/section-food.png" alt="日式沖繩飯糰、飲品、點心">
          <p class="section-lead">飯糰口味多，有雞、豬、牛、海鮮多種選擇；醬自家調製，層次豐富。</p>

          <div class="photo-carousel" data-carousel aria-label="美味菜單照片輪播">
            <div class="carousel-track">
              <img class="active" src="assets/food-1.jpg" alt="經典台灣味飯糰">
              <img src="assets/food-2.jpg" alt="照燒嫩雞腿飯糰">
              <img src="assets/food-3.jpg" alt="龍蝦干貝酥飯糰">
              <img src="assets/food-4.jpg" alt="松露牛肉排飯糰">
              <img src="assets/food-5.jpg" alt="炸蝦山角飯丸">
              <img src="assets/food-6.jpg" alt="濃起司薯餅">
            </div>
            <div class="carousel-dots" aria-hidden="true"></div>
          </div>

          <div class="menu-items">
            <article class="menu-item">
              <a href="assets/food-1.jpg" data-lightbox><img src="assets/food-1.jpg" alt="經典台灣味飯糰"></a>
              <p>經典台灣味：酸菜肉鬆加午餐肉，搭配玉子燒，風味傳統，營養充足。</p>
            </article>
            <article class="menu-item">
              <a href="assets/food-2.jpg" data-lightbox><img src="assets/food-2.jpg" alt="照燒嫩雞腿飯糰"></a>
              <p>照燒嫩雞腿：選用新鮮雞腿搭配照燒醬汁，肉質細嫩可口，每一口都滿足。</p>
            </article>
            <article class="menu-item">
              <a href="assets/menu-food-3.jpg" data-lightbox><img src="assets/menu-food-3.jpg" alt="花生醬豬排飯糰"></a>
              <p>花生醬豬排：豬排燒肉搭配黑胡椒醬醃製，內搭滑順花生醬，香氣濃郁。</p>
            </article>
            <article class="menu-item">
              <a href="assets/menu-food-4.jpg" data-lightbox><img src="assets/menu-food-4.jpg" alt="龍蝦佐炸蝦飯糰"></a>
              <p>龍蝦佐炸蝦飯糰：整隻炸蝦搭配龍蝦沙拉，還有玉子燒、午餐肉，層層豐富堆疊。</p>
            </article>
          </div>

          <div class="photo-wall" aria-label="餐點照片牆">
            <a href="assets/food-1.jpg" data-lightbox><img src="assets/food-1.jpg" alt="經典台灣味飯糰"></a>
            <a href="assets/food-2.jpg" data-lightbox><img src="assets/food-2.jpg" alt="照燒嫩雞腿飯糰"></a>
            <a href="assets/food-3.jpg" data-lightbox><img src="assets/food-3.jpg" alt="龍蝦干貝酥飯糰"></a>
            <a href="assets/food-4.jpg" data-lightbox><img src="assets/food-4.jpg" alt="松露牛肉排飯糰"></a>
            <a href="assets/food-5.jpg" data-lightbox><img src="assets/food-5.jpg" alt="炸蝦山角飯丸"></a>
            <a href="assets/food-6.jpg" data-lightbox><img src="assets/food-6.jpg" alt="濃起司薯餅"></a>
          </div>

          <div class="full-menu-block">
            <a href="assets/full-menu.png" data-lightbox>
              <img src="assets/full-menu.png" alt="飯不著痕跡完整菜單">
            </a>
            <p>更多美味 ..</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div>2026 © 飯不著痕跡</div>
