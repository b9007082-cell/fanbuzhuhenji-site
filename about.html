            <p>飯不著痕跡成立於2020年，所在位置在豐原國中85度C左手邊，加油站斜對面的奶茶色房子。</p>
            <p>販售日式沖繩飯糰，有別於一般古早味飯糰，品項多元有創意。以海苔壽司飯包覆著飽滿餡料，有炸蝦、牛肉排、干貝酥、可樂餅多種口味選擇，飲品有燕麥奶、紅茶、豆乳，成為早午餐的新選擇。</p>
            <p>瓦斯使用安全「昇來瓦斯」，讓美好早餐時光輕鬆又放心。</p>
